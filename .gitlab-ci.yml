image: ubuntu:24.04

variables:
  DEBIAN_FRONTEND: noninteractive
  CMAKE_EXPORT_COMPILE_COMMANDS: "ON"

include:
  - template: Security/SAST.gitlab-ci.yml

sast:
  before_script:
    - ""

stages:
  - static_analysis
  - test
  - test_sanitizers
  - test_valgrind
  - coverage
  - build_cross_compile
  - release

before_script:
  - apt-get update -y
  - apt-get install -y cmake ninja-build python3 g++ gcc clang clang-format clang-tidy valgrind gcovr git curl pkg-config cppcheck jq bc

# ==========================================
# 1. STATIC ANALYSIS & LINTING
# ==========================================
format_check:
  stage: static_analysis
  script:
    - python3 scripts/format.py linux-debug
    - git diff --exit-code || (echo "Code formatting issues found. Run 'python3 scripts/format.py' locally." && exit 1)

cppcheck_analysis:
  stage: static_analysis
  script:
    - cppcheck --enable=all --error-exitcode=1 --suppress=missingIncludeSystem -I libs/crypto/primitives/include libs/ apps/

# ==========================================
# 2. COMPILER & SANITIZER MATRIX
# ==========================================
run_tests_matrix:
  stage: test_sanitizers
  parallel:
    matrix:
      - PRESET: [linux-asan, linux-ubsan, linux-tsan]
        COMPILER_CXX: [g++, clang++]
        COMPILER_CC: [gcc, clang]
  script:
    - export CXX=$COMPILER_CXX
    - export CC=$COMPILER_CC
    - echo "Building with $COMPILER_CXX and preset $PRESET..."
    - python3 scripts/build.py $PRESET
    - python3 scripts/test.py $PRESET

# ==========================================
# 3. DEEP MEMORY & THREAD ANALYSIS
# ==========================================
run_valgrind_memcheck:
  stage: test_valgrind
  script:
    - python3 scripts/build.py linux-debug
    - valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./build/linux-debug/tests/blank_chat_server_tests
    - valgrind --tool=memcheck --leak-check=full --show-leak-kinds=all --track-origins=yes --error-exitcode=1 ./build/linux-debug/tests/blank_chat_client_tests

run_valgrind_helgrind:
  stage: test_valgrind
  script:
    - python3 scripts/build.py linux-debug
    - valgrind --tool=helgrind --error-exitcode=1 ./build/linux-debug/tests/blank_chat_server_tests

# ==========================================
# 4. COVERAGE (Non-blocking)
# ==========================================
report_coverage:
  stage: coverage
  script:
    - python3 scripts/coverage.py
    - gcovr --root . --filter libs/ --json coverage.json
    - COVERAGE_PCT=$(jq '.line_percent' coverage.json)
    - echo "Total Line Coverage is $COVERAGE_PCT%"
    - |
      if [ $(echo "$COVERAGE_PCT < 95.0" | bc -l) -eq 1 ]; then
        echo "WARNING: Code coverage $COVERAGE_PCT% is below the recommended 95.0% threshold. (Strict enforcement disabled)"
      else
        echo "SUCCESS: Code coverage meets requirements!"
      fi
  coverage: '/lines:\s+\d+\.\d+%/'
  artifacts:
    paths:
      - build/linux-coverage/coverage_report/
    expire_in: 1 month

# ==========================================
# 5. CROSS-COMPILATION VERIFICATION
# ==========================================
test_yocto_build:
  stage: build_cross_compile
  script:
    - python3 scripts/download_sdk.py
    - python3 scripts/build.py yocto-debug

# ==========================================
# 6. PRODUCTION RELEASE BUILD
# ==========================================
build_release:
  stage: release
  script:
    - python3 scripts/build.py linux-static-release
  artifacts:
    name: "blank-chat-release-$CI_COMMIT_SHORT_SHA"
    paths:
      - build/linux-static-release/apps/blank_chat_server
      - build/linux-static-release/apps/blank_chat_client
    expire_in: 1 month
