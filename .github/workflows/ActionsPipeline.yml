name: BlankChat CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  format-check:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
        
      - name: Run clang-format (Dry Run)
        run: find modules apps tests -iname "*.h" -o -iname "*.hpp" -o -iname "*.cpp" | xargs clang-format --dry-run --Werror

  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    needs: format-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false 
      matrix:
        preset: [linux-asan, linux-ubsan, linux-tsan, linux-coverage]

    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-tidy gcovr

      - name: Setup vcpkg (with caching)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build Project
        run: cmake --build build/${{ matrix.preset }}

      - name: Run Unit Tests
        if: matrix.preset != 'linux-coverage'
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      - name: Run Tests & Generate Coverage
        if: matrix.preset == 'linux-coverage'
        run: cmake --build build/linux-coverage --target coverage

      - name: Upload Coverage Report
        if: matrix.preset == 'linux-coverage'
        uses: actions/upload-artifact@v4
        with:
          name: HTML-Coverage-Report
          path: build/linux-coverage/coverage_report/
